<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Tabuada</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <h1>Gerar Tabuada</h1>

    <section>

        <div id="div1">
            <p><label for="numero">Número</label>
                <input type="number" inputmode="numeric" name="numero" id="numero">
            </p>
            <p>
                <input type="button" value="Gerar" id="btnGerar">
            </p>
        </div>

        <div id="div2">
            <label for="selectTabuada">Tabuada:</label>
            <select name="selectTabuada" id="selectTabuada" size="11">
                <option value="Exemplo" selected>Exemplo:</option>
                <option value="Exemplo">1 x 1 = 1</option>
                <option value="Exemplo">1 x 2 = 2</option>
                <option value="Exemplo">1 x 3 = 3</option>
                <option value="Exemplo">1 x 4 = 4</option>
                <option value="Exemplo">1 x 5 = 5</option>
                <option value="Exemplo">1 x 6 = 6</option>
                <option value="Exemplo">1 x 7 = 7</option>
                <option value="Exemplo">1 x 8 = 8</option>
                <option value="Exemplo">1 x 9 = 9</option>
                <option value="Exemplo">1 x 10 = 10</option>
            </select>
        </div>

    </section>

    <footer>
        <p>&copy; Henrique Bonito</p>
    </footer>

</body>

</html>
